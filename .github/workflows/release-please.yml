name: release-please

on:
  workflow_dispatch:
    inputs:
      package-folder:
        description: 'The package to be released'
        required: true
        type: choice
        options:
          - middleware-code-coverage
  push:
    branches:
      - main

permissions: {}

jobs:
  pull-request:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{steps.release.outputs.releases_created}}
      paths_released: ${{steps.release.outputs.paths_released}}
    steps:
    - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
      id: release
      with:
        token: ${{secrets.GH_OPENUI5BOT}}
        path: packages/${{inputs.package-folder}}
  publish-package:
    needs: pull-request
    if: ${{needs.pull-request.outputs.releases_created && toJson(fromJson(needs.pull-request.outputs.paths_released)) != '[]'}}
    runs-on: ubuntu-24.04
    permissions:
      id-token: write # Required for trusted publishing via OIDC (https://docs.npmjs.com/trusted-publishers)
    # The GitHub Actions Environment configured for the trusted publisher
    environment: npmjs:@ui5/middleware-code-coverage
    strategy:
      matrix:
        path_released: ${{fromJson(needs.pull-request.outputs.paths_released)}}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Node.js LTS
      uses: actions/setup-node@v6
      with:
        node-version: 24.x
    - name: Publish to npm
      env:
        PATH_RELEASED: ${{matrix.path_released}}
      run: |
        cd "$PATH_RELEASED"
        npm publish --workspaces false --access public
